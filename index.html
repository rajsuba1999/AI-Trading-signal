<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📈 AI Trading Analyzer</h1>
    <p>Upload your Quotex chart screenshot for analysis.</p>

    <input type="file" id="imageInput" accept="image/*">

    <br><br>

    <button onclick="analyzeChart()">
        Analyze Chart
    </button>

    <div id="result">
        <h2>Analysis Result</h2>

        <p><b>Trend:</b> Waiting...</p>
        <p><b>Support:</b> Waiting...</p>
        <p><b>Resistance:</b> Waiting...</p>
        <p><b>Momentum:</b> Waiting...</p>
        <p><b>Recommendation:</b> Upload a chart first.</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
